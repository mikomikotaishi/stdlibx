name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    name: Ubuntu
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: GCC, cc: gcc-16, cxx: g++-16 }
          - { name: Clang, cc: clang-22, cxx: clang++-22 }
        build_type: [Debug, Release]
    
    steps:
    - uses: actions/checkout@v4
  
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build wget software-properties-common \
          unixodbc unixodbc-dev libstdc++6 libgmp-dev libsodium-dev zlib1g-dev

        # Install CMake
        wget https://github.com/Kitware/CMake/releases/download/v4.2.3/cmake-4.2.3-linux-x86_64.tar.gz
        tar -xzf cmake-4.2.3-linux-x86_64.tar.gz
        sudo mv cmake-4.2.3-linux-x86_64 /opt/cmake-4.2.3
        echo "/opt/cmake-4.2.3/bin" >> $GITHUB_PATH
        export PATH=/opt/cmake-4.2.3/bin:$PATH
        
        # Install compilers
        if [[ "${{ matrix.compiler.cxx }}" == g++* ]]; then
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler.cc }} ${{ matrix.compiler.cxx }}
        elif [[ "${{ matrix.compiler.cxx }}" == clang++* ]]; then
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y libstdc++-16-dev

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 100
        fi
        
        # Verify installations
        echo "CMake version:"
        cmake --version
        echo "Compiler version:"
        ${{ matrix.compiler.cxx }} --version || echo "Compiler not found"
        which ${{ matrix.compiler.cxx }} || echo "Compiler not in PATH"
    
    - name: Configure CMake
      env:
        CC: ${{ matrix.compiler.cc }}
        CXX: ${{ matrix.compiler.cxx }}
      run: |
        which $CC || echo "CC not found"
        which $CXX || echo "CXX not found"
        EXTRA_FLAGS=""
        if [[ "${{ matrix.compiler.name }}" == "GCC" ]]; then
          EXTRA_FLAGS="-DSTDLIBX_EXTENSIONS_COMPILE_MICROSOFT_GUIDELINES_SUPPORT_LIBRARY=OFF \
                       -DSTDLIBX_EXTENSIONS_COMPILE_MATH_GMP_LIBRARY=OFF"
        fi
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DSTDLIB_BUILD_TESTS=OFF \
          $EXTRA_FLAGS
    
    - name: Build
      run: cmake --build build
    
    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.compiler.name }}-${{ matrix.build_type }}
        path: |
          build/CMakeFiles/*.log
          build/compile_commands.json
